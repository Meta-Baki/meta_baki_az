<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>META - Meteoroloji Xəbərlər</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* TOP BAR */
.header{
    padding:20px;
    background:#111c33;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* MAIN CONTAINER */
.container{
    max-width:900px;
    margin:20px auto;
    padding:10px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* IMAGE */
.card img{
    width:100%;
    height:280px;
    object-fit:cover;
}

/* CONTENT */
.content{
    padding:20px;
}

/* TITLE */
h1{
    font-size:20px;
    margin-bottom:10px;
}

/* TIME */
.time{
    font-size:12px;
    opacity:0.7;
    margin-bottom:15px;
}

/* TEXT */
.text{
    white-space:pre-line;
    font-size:15px;
    line-height:1.6;
    opacity:0.95;
}

/* INFO ROW */
.info{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.box{
    background:rgba(255,255,255,0.06);
    padding:10px;
    border-radius:10px;
    font-size:13px;
}

/* BUTTON */
button{
    position:fixed;
    top:10px;
    right:10px;
    background:#38bdf8;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    🌦 META Meteoroloji - Abşeron Xəbər Mərkəzi
</div>

<button onclick="loadNews()">🔄 Yenilə</button>

<div class="container">

    <div class="card">

        <img id="img" src="">

        <div class="content">

            <h1 id="title">Yüklənir...</h1>

            <div class="time" id="time"></div>

            <div class="text" id="text"></div>

            <div class="info">
                <div class="box" id="temp"></div>
                <div class="box" id="wind"></div>
                <div class="box" id="hum"></div>
                <div class="box" id="rain"></div>
            </div>

        </div>
    </div>

</div>

<script>

async function loadNews(){

    try{
        let r = await fetch("/news_data");
        let d = await r.json();

        document.getElementById("title").innerText = d.title;
        document.getElementById("time").innerText = "🕒 " + d.time;
        document.getElementById("text").innerText = d.text;

        document.getElementById("img").src = d.image;

        document.getElementById("temp").innerText = "🌡 Temperatur: " + d.temp + "°C";
        document.getElementById("wind").innerText = "💨 Külək: " + d.wind + " km/saat";
        document.getElementById("hum").innerText = "💧 Rütubət: " + d.humidity + "%";
        document.getElementById("rain").innerText = "🌧 Yağış: " + d.rain + " mm";

    } catch(e){
        document.getElementById("text").innerText = "Məlumat yüklənmədi";
    }
}

loadNews();

/* авто-обновление каждые 2 минуты */
setInterval(loadNews, 120000);

</script>

</body>
</html>
